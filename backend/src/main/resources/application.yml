spring:
  application:
    name: ${BACKEND_APPLICATION_NAME:kollapp-server}
  datasource:
    url: jdbc:mysql://${BACKEND_DB_HOST:localhost}:${BACKEND_DB_PORT:3306}/kollapp?allowPublicKeyRetrieval=true&useSSL=false
    username: ${BACKEND_DB_USER:admin}
    password: ${BACKEND_DB_PASSWORD:pass}
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false
  profiles:
    active: ${BACKEND_PROFILE:default}

  mail:
    host: ${BACKEND_MAIL_HOST:localhost}
    port: ${BACKEND_MAIL_PORT:1025}
    username: ${BACKEND_MAIL_USER:}
    password: ${BACKEND_MAIL_PASSWORD:}
    default-encoding: UTF-8
    properties:
      mail:
        smtp:
          auth: ${BACKEND_MAIL_AUTH:false}
          starttls:
            enable: ${BACKEND_MAIL_STARTTLS:false}
  messages:
    encoding: UTF-8
  http:
    encoding:
      charset: UTF-8
      enabled: true
      force: true

server:
  port: ${BACKEND_PORT:8080}

i18n:
  baseName: i18n/messages

kollapp:
  application:
    domain: ${BACKEND_DOMAIN:localhost}
    host: ${BACKEND_HOST:localhost}
    production: ${BACKEND_PRODUCTION:false}
    version: "@project.version@"
    port: ${BACKEND_PORT:8080}
    staticCacheDays: ${BACKEND_STATIC_CACHE_DAYS:356}
    organizationInvitationValidityDays: ${BACKEND_ORGANIZATION_INVITATION_VALIDITY_DAYS:3}

  client:
    webBaseUrl: ${BACKEND_CLIENT_WEB_URL:http://localhost:5173}
    androidBaseUrl: ${BACKEND_CLIENT_ANDROID_URL:kollapp:/}

  cors:
    allowedOriginPattern: ${BACKEND_CORS_URL:http://localhost:*}
    allowedMethods: ${BACKEND_CORS_METHODS:GET,POST,PUT,DELETE,OPTIONS}
    allowedHeaders: ${BACKEND_CORS_HEADERS:Content-Type,Authorization,Accept,X-Requested-With}
    exposedHeaders: ${BACKEND_CORS_EXPOSED_HEADERS:Authorization,Content-Disposition}
    allowCredentials: ${BACKEND_CORS_CREDENTIALS:true}

  ratelimit:
    requests: ${BACKEND_RATE_LIMIT:10}
    seconds: ${BACKEND_RATE_LIMIT_TIME:60}

  jwt:
    authSecret: ${BACKEND_JWT_AUTH_SECRET:3YBsUJWIZWjvoxGOmwtHYJ4oBKisuSzKxkdLOqyouA926uO2kW}
    authExpirationInSeconds: ${BACKEND_JWT_AUTH_EXPIRATION_IN_SECONDS:86400}
    refreshSecret: ${BACKEND_JWT_REFRESH_SECRET:oeuBZfbz5nUD7kMeKvCWSf9231uXuHVEm5EUjsIrrfLVMaj86h}
    refreshExpirationInSeconds: ${BACKEND_JWT_REFRESH_EXPIRATION_IN_SECONDS:2592000}
    confirmationSecret: ${BACKEND_JWT_CONFIRMATION_SECRET:H4WyGZBZMbUsADzq71DLLQjGwut2fa6zYP6fJ2AEjvpegFEpQV}
    confirmationExpirationInSeconds: ${BACKEND_JWT_CONFIRMATION_EXPIRATION_IN_SECONDS:3600}
    resetPasswordSecret: ${BACKEND_JWT_RESET_PASSWORD_SECRET:363KNcnu8e2hPYImKLcLIofgDfAeQBPEVYtphCONRL1jac2vkr}
    resetPasswordExpirationInSeconds: ${BACKEND_JWT_RESET_PASSWORD_EXPIRATION_IN_SECONDS:3600}
