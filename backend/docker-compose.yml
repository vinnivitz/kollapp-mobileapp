services:
  kollapp-db:
    image: mysql:8.4
    container_name: kollapp-db
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "3306:3306"
    volumes:
      - ./db:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost"]
      timeout: 20s
      retries: 10
      interval: 10s

  kollapp-mail:
    image: mailhog/mailhog:v1.0.1
    container_name: kollapp-mail
    restart: unless-stopped
    ports:
      - "1025:1025"
      - "8025:8025"