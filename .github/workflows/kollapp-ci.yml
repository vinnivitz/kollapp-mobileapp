name: Deploy Docker Image

on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: "Release Version"
        required: true
        default: "X.Y.Z"
      developmentVersion:
        description: "New development version"
        required: true
        default: "X.Y.Z-SNAPSHOT"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Maven Verify
        run: mvn -B verify --file backend/server/pom.xml

      - name: Set up GitHub
        run: |
          git config --global user.name 'GitHub-Actions'
          git config --global user.email 'gha@github.com'

      - name: Prepare Release
        run: |
          mvn --file backend/server/pom.xml versions:set -DnewVersion=${{ github.event.inputs.releaseVersion }}
          git add backend/server
          git commit -m "[GitHubActions] set release version to ${{ github.event.inputs.releaseVersion }}"
          git push
          git tag -a v${{ github.event.inputs.releaseVersion }} -m "Release ${{ github.event.inputs.releaseVersion }}"
          git push origin v${{ github.event.inputs.releaseVersion }}

      - name: Perform Release
        run: |
          mvn -B package --file backend/server/pom.xml

      - name: Setup new development version
        run: |
          mvn --file backend/server/pom.xml versions:set -DnewVersion=${{ github.event.inputs.developmentVersion }}
          git add backend/server
          git commit -m "[GitHubActions] set release version to ${{ github.event.inputs.developmentVersion }}"
          git push

      - name: Docker Labels
        id: meta
        uses: docker/metadata-action@v4
        with:
          images: registry.kollapp.org/${{ github.repository }}
          tags: |
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=semver,pattern={{major}}

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: registry.kollapp.org/v2
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push
        uses: docker/build-push-action@v5
        with:
          context: ./backend/server
          push: true
          tags: ${{ steps.meta.outputs.tags }}
