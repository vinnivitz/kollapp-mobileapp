name: Deploy Docker Image
env:
  ACTIONS_STEP_DEBUG: true
on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: "Release Version"
        required: true
        default: "X.Y.Z"
      developmentVersion:
        description: "New development version"
        required: true
        default: "X.Y.Z-SNAPSHOT"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Maven Verify
        run: mvn -B verify --file backend/server/pom.xml

      - name: Set up GitHub
        run: |
          git config --global user.name 'GitHub-Actions'
          git config --global user.email 'gha@github.com'

      - name: Prepare Release
        run: |
          mvn --file backend/server/pom.xml versions:set -DnewVersion=${{ github.event.inputs.releaseVersion }}
          git add backend/server
          git commit -m "[GitHubActions] set release version to ${{ github.event.inputs.releaseVersion }}"
          git push
          git tag -a v${{ github.event.inputs.releaseVersion }} -m "Release ${{ github.event.inputs.releaseVersion }}"
          git push origin v${{ github.event.inputs.releaseVersion }}

      - name: Perform Release
        run: |
          mvn -B package --file backend/server/pom.xml

      - name: Setup new development version
        run: |
          mvn --file backend/server/pom.xml versions:set -DnewVersion=${{ github.event.inputs.developmentVersion }}
          git add backend/server
          git commit -m "[GitHubActions] set release version to ${{ github.event.inputs.developmentVersion }}"
          git push

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: registry.kollapp.org/v2
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build and Push Docker Image
        run: |
          cd backend/server
          docker buildx build --push --tag registry.kollapp.org/v2/kollapp-backend:v${{ github.event.inputs.releaseVersion }} .

