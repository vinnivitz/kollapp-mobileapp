name: Run on Commit

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Maven Verify
        run: |
          mvn -f backend/pom.xml -B clean verify
      - name: Publish quality analysis results to SonarQube
        run: |
          mvn -f backend/pom.xml -B sonar:sonar -Dsonar.projectKey=kollapp -Dsonar.projectName='kollapp' -Dsonar.host.url=${{ secrets.SONARQUBE_SERVER }} -Dsonar.token=${{ secrets.SONARQUBE_TOKEN }} -Dsonar.java.coveragePlugin=jacoco -Dsonar.dynamicAnalysis=reuseReports -Dsonar.jacoco.reportPath=./backend/target/jacoco.exec
      - name: Setup Node 22.9
        uses: actions/setup-node@v4
        with:
          node-version: '22.9.0'
      - name: NPM Build
        run: |
          npm -g install pnpm 
          pnpm install --prefix mobileapp --frozen-lockfile
          pnpm --prefix mobileapp validate
          pnpm --prefix mobileapp test
          pnpm --prefix mobileapp build
      - name: Dump Docker container logs
        if: failure()
        run: |
          docker ps -a
          docker logs $(docker ps -q --filter ancestor=mysql) || true
