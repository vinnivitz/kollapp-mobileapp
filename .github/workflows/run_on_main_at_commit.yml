name: Run on Commit

on:
  push:
    branches:
      - main
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven
      - name: Maven Verify
        run: |
          ./backend-parent/mvnw -f backend-parent/pom.xml -B clean verify
      #      - name: Publish backend quality analysis results to SonarQube
      #        run: |
      #          mvn -f backend/pom.xml -B org.sonarsource.scanner.maven:sonar-maven-plugin:sonar -Dsonar.projectKey=kollapp-backend -Dsonar.projectName='kollapp-backend' -Dsonar.host.url=${{ secrets.SONARQUBE_SERVER }} -Dsonar.token=${{ secrets.SONARQUBE_TOKEN }} -Dsonar.java.coveragePlugin=jacoco -Dsonar.dynamicAnalysis=reuseReports -Dsonar.jacoco.reportPath=./backend/target/jacoco.exec
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'
      - name: NPM Build
        run: |
          npm -g install pnpm 
          pnpm install --prefix mobileapp --frozen-lockfile
          pnpm --prefix mobileapp validate
          pnpm --prefix mobileapp test
          pnpm --prefix mobileapp build
      #      - name: Publish frontend quality analysis results to SonarQube
      #        run: |
      #          wget https://binaries.sonarsource.com/Distribution/sonar-scanner-cli/sonar-scanner-cli-7.2.0.5079-linux-x64.zip
      #          unzip sonar-scanner-cli-7.2.0.5079-linux-x64.zip
      #          sonar-scanner-7.2.0.5079-linux-x64/bin/sonar-scanner -Dsonar.projectKey=kollapp-frontend -Dsonar.sources=mobileapp -Dsonar.host.url=https://sonar.kollapp.org -Dsonar.token=sqp_5015e2eb160ff406830b5f1a66828cbdb8fe8c74 -Dsonar.javascript.lcov.reportPaths=./mobileapp/coverage/lcov.info
      - name: Dump Docker container logs
        if: failure()
        run: |
          docker ps -a
          docker logs $(docker ps -q --filter ancestor=mysql) || true
