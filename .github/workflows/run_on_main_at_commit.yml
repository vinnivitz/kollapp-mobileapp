name: Run on Commit

on:
  push:
    branches:
      - main  # Change this to your target branch

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4
    - name: Set up JDK 21
      uses: actions/setup-java@v4
      with:
        java-version: '21'
        distribution: 'temurin'
        cache: maven
    - name: Maven Verify
      run: |
        cd backend
        mvn -B verify --file pom.xml
    - name: Use Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '22.9.0'
    - name: NPM Build
      run: |
        cd frontend
        npm run lint && run build
