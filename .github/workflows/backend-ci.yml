name: Deploy Backend Docker Image
env:
  ACTIONS_STEP_DEBUG: true
on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: "Release Version"
        required: true
        default: "X.Y.Z"
      developmentVersion:
        description: "New development version"
        required: true
        default: "X.Y.Z-SNAPSHOT"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up GitHub
        run: |
          git config --global user.name 'GitHub-Actions'
          git config --global user.email 'gha@kollapp.org'
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'


      - name: Maven Verify
        working-directory: backend-parent
        run: ./mvnw clean verify -B

      - name: Set release version
        working-directory: backend-parent
        run: |
          ./mvnw versions:set -DnewVersion=${{ github.event.inputs.releaseVersion }}

      - name: Build Release Version and publish API types
        working-directory: backend-parent
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: ./mvnw -B clean install -DskipTests -Djqassistant.skip=true -Pgenerate-client-api-types

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: nexus.kollapp.org/repository/docker
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        uses: docker/build-push-action@v5
        with:
          context: backend-parent
          file: backend-parent/backend/Dockerfile
          push: true
          platforms: linux/amd64
          tags: |
            nexus.kollapp.org/repository/docker/kollapp/backend:v${{ github.event.inputs.releaseVersion }}
            nexus.kollapp.org/repository/docker/kollapp/backend:latest

      - name: Commit and tag release
        working-directory: backend-parent
        run: |
          git add .
          git commit -m "[GitHubActions] set release version to ${{ github.event.inputs.releaseVersion }}"
          git tag -a v${{ github.event.inputs.releaseVersion }} -m "Release ${{ github.event.inputs.releaseVersion }}"
          git push origin HEAD
          git push origin v${{ github.event.inputs.releaseVersion }}

      - name: Setup new development version and push
        working-directory: backend-parent
        run: |
          ./mvnw versions:set -DnewVersion=${{ github.event.inputs.developmentVersion }}
          git add .
          git commit -m "[GitHubActions] set development version to ${{ github.event.inputs.developmentVersion }}"
          git push