name: Deploy Backend Docker Image
env:
  ACTIONS_STEP_DEBUG: true
on:
  workflow_dispatch:
    inputs:
      releaseVersion:
        description: "Release Version"
        required: true
        default: "X.Y.Z"
      developmentVersion:
        description: "New development version"
        required: true
        default: "X.Y.Z-SNAPSHOT"

jobs:
  docker:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v3
        with:
          java-version: '21'
          distribution: 'temurin'
          cache: maven

      - name: Set up GitHub
        run: |
          git config --global user.name 'GitHub-Actions'
          git config --global user.email 'gha@kollapp.org'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version-file: '.nvmrc'

      - name: Maven Verify
        run: ./backend-parent/mvnw clean verify -B --file backend-parent/pom.xml

      - name: Prepare Release
        run: |
          ./backend-parent/mvnw --file backend-parent/pom.xml versions:set -DnewVersion=${{ github.event.inputs.releaseVersion }}
          git add backend-parent
          git commit -m "[GitHubActions] set release version to ${{ github.event.inputs.releaseVersion }}"
          git push
          git tag -a v${{ github.event.inputs.releaseVersion }} -m "Release ${{ github.event.inputs.releaseVersion }}"
          git push origin v${{ github.event.inputs.releaseVersion }}

      - name: Build Release Version and publish API types
        env:
          NPM_TOKEN: ${{ secrets.NPM_TOKEN }}
        run: |
          ./backend-parent/mvnw -B clean install --file backend-parent/pom.xml -DskipTests -Djqassistant.skip=true -Pgenerate-client-api-types

      - name: Log in to Docker registry
        uses: docker/login-action@v3
        with:
          registry: registry.kollapp.org
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and Push Docker Image
        run: |
          cd backend-parent/backend
          docker buildx build --push --tag registry.kollapp.org/kollapp/backend:v${{ github.event.inputs.releaseVersion }} --tag registry.kollapp.org/kollapp/backend:latest .

      - name: Setup new development version
        run: |
          ./backend-parent/mvnw --file backend-parent/pom.xml versions:set -DnewVersion=${{ github.event.inputs.developmentVersion }}
          git add backend-parent/
          git commit -m "[GitHubActions] set release version to ${{ github.event.inputs.developmentVersion }}"
          git push