<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
            background-color: #f4f4f4;
            color: #333;
        }

        .container {
            max-width: 600px;
            margin: 0 auto;
            background: white;
            padding: 20px;
            text-align: center;
            border-radius: 8px;
            border: 1px solid #ddd;
        }

        .logo {
            margin-bottom: 20px;
        }

        h1 {
            color: #036a4b;
            margin: 0;
        }

        p {
            margin: 20px 0;
            color: #555;
            font-size: 16px;
        }

        .button {
            display: inline-block;
            padding: 10px 20px;
            background-color: #048c62;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            transition: background-color 0.3s;
        }

        .button:hover {
            background-color: #026d49;
        }
    </style>
</head>
<body>
<div class="container">
    <div class="logo">
        <img alt="Kollapp Logo" th:src="${logoUrl}" width="120"/>
    </div>
    <h1 th:text="${title}">Forgotten your password?</h1>
    <p th:text="${text}">No problem! Just click the link below and set a new one.</p>
    <a class="button" th:href="${resetPasswordUrl}" th:text="${button}">Change password</a>
</div>
</body>
</html>
